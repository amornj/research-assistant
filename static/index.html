<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Assistant</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Top Bar -->
  <div class="topbar">
    <h1>Research Assistant</h1>
    <select id="project-select">
      <option value="">Select project...</option>
    </select>
    <button id="btn-new-project">+ New Project</button>
    <span class="spacer"></span>
    <span id="project-name" style="font-size:13px;color:var(--text-dim)"></span>
    <span class="spacer"></span>
    <div class="export-dropdown">
      <button id="btn-export-main">Export ▾</button>
      <div id="export-options" class="export-options hidden">
        <button data-format="docx">DOCX</button>
        <button data-format="pdf">PDF</button>
        <button data-format="md">Markdown</button>
      </div>
    </div>
  </div>

  <!-- Main layout -->
  <div class="main">
    <!-- Left: Notebook Chat -->
    <div class="pane-notebook" id="pane-notebook">
      <div class="header">NotebookLM</div>
      <div class="chat-messages" id="chat-messages">
        <div class="status-msg">Create or select a project to start querying</div>
      </div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="Ask your notebook...">
        <button id="chat-send">Send</button>
      </div>
    </div>

    <!-- Draggable divider -->
    <div class="pane-divider" id="pane-divider"></div>

    <!-- Right: Editor + Tabbed bottom -->
    <div class="pane-right">
      <!-- Editor -->
      <div class="pane-editor">
        <div class="editor-toolbar">
          <button id="btn-bold"><b>B</b></button>
          <button id="btn-italic"><i>I</i></button>
          <button id="btn-underline"><u>U</u></button>
          <div class="sep"></div>
          <button id="btn-h1">H1</button>
          <button id="btn-h2">H2</button>
          <button id="btn-h3">H3</button>
          <div class="sep"></div>
          <button id="btn-ul">&#8226; List</button>
          <button id="btn-ol">1. List</button>
          <button id="btn-quote">&ldquo; Quote</button>
        </div>
        <div class="editor-content">
          <div id="editor-mount"></div>
        </div>
      </div>

      <div class="pane-divider-h" id="pane-divider-h"></div>

      <!-- Tabbed bottom pane -->
      <div class="pane-bottom">
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="ai-writing">AI Writing</button>
          <button class="tab-btn" data-tab="zotero">Zotero</button>
        </div>
        <div class="tab-content" id="tab-ai-writing">
          <div class="ai-writing-controls">
            <label>Model</label>
            <select id="ai-model-select">
              <option value="minimax-2.5">MiniMax 2.5</option>
            </select>
            <button id="ai-oauth-btn" class="ai-oauth-btn">Connect</button>
            <span id="ai-oauth-status" class="ai-oauth-status hidden">✓ Connected</span>
          </div>
          <div class="ai-writing-hint">
            <p>Right-click selected text in the editor to rewrite with AI.</p>
          </div>
          <div class="ai-writing-log" id="ai-writing-log"></div>
          <div class="ai-chat-input-row">
            <input id="ai-chat-input" type="text" placeholder="Ask AI to edit document...">
            <button id="ai-chat-send">Send</button>
          </div>
        </div>
        <div class="tab-content hidden" id="tab-zotero">
          <div class="zotero-header">
            <span>References</span>
            <input id="ref-filter" type="text" placeholder="Filter references...">
          </div>
          <div class="ref-list" id="ref-list">
            <div class="status-msg">No references loaded</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Context menu for AI rewrite -->
  <div class="context-menu hidden" id="ai-context-menu">
    <div class="context-menu-header">AI Rewrite</div>
    <input id="ai-rewrite-instruction" type="text" placeholder="Describe style change...">
    <button id="ai-rewrite-go">Rewrite</button>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
